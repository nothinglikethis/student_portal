<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Internal Server Error</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #F8FAFC;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #1E293B;
            text-align: center;
        }
        .container {
            background-color: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            font-size: 3rem;
            margin: 0 0 1rem 0;
            color: #E11D48; /* Red color for server errors to indicate urgency/failure */
        }
        h2 {
            font-size: 1.5rem;
            margin: 0 0 1rem 0;
            font-weight: 600;
        }
        p {
            font-size: 1rem;
            line-height: 1.5;
            color: #64748B;
            margin: 0 0 2rem 0;
        }
        a.button {
            display: inline-block;
            background-color: #4F46E5;
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            transition: background-color 0.2s ease;
        }
        a.button:hover {
            background-color: #4338CA;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>500</h1>
        <h2>Internal Server Error</h2>
        <p>Our servers are currently experiencing an issue. Please try again in a few minutes.</p>
        <a href="/" class="button">Return to Home</a>
    </div>
</body>
</html>
