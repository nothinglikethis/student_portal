{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Student Login — Admission Portal</title>
    <script src="{% static 'portal/js/lucide.min.js' %}"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --indigo-500: #6366F1;
            --indigo-600: #4F46E5;
            --indigo-700: #4338CA;
            --indigo-glow: rgba(79, 70, 229, 0.25);
            --indigo-ring: rgba(79, 70, 229, 0.15);
            --gray-100: #F1F5F9;
            --gray-200: #E5E7EB;
            --gray-300: #CBD5E1;
            --gray-400: #94A3B8;
            --gray-500: #64748B;
            --gray-700: #334155;
            --gray-900: #0F172A;
            --red-500: #EF4444;
            --red-50: #FEF2F2;
            --green-700: #15803D;
            --green-50: #F0FDF4;
            --green-200: #BBF7D0;
            --bg-page: #F8FAFC;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow-x: hidden;
            position: relative;
        }

        @media (max-width: 767px) {
            body {
                display: flex;
                align-items: flex-start;
                justify-content: center;
                padding-top: 24px;
                padding-bottom: 24px;
            }
        }

        .glow-1, .glow-2 {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .glow-1 {
            width: 600px;
            height: 600px;
            background: rgba(79, 70, 229, 0.10);
            top: -100px;
            left: -100px;
            filter: blur(100px);
        }
        .glow-2 {
            width: 500px;
            height: 500px;
            background: rgba(99, 102, 241, 0.08);
            bottom: -50px;
            right: -50px;
            filter: blur(80px);
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.10);
            border: 1px solid var(--gray-200);
            overflow: hidden;
            z-index: 10;
            position: relative;
            animation: fadeIn 300ms ease-out forwards;
            transition: transform 220ms ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(180deg, var(--indigo-600) 0%, var(--indigo-500) 100%);
            padding: 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-container {
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .header svg {
            width: 32px;
            height: 32px;
            color: #FFFFFF;
        }

        .header h1 {
            font-size: 34px;
            line-height: 42px;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 15px;
            line-height: 24px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
        }

        .content {
            padding: 40px;
        }

        @media (max-width: 480px) {
            .card { border-radius: 20px; }
            .header { padding: 32px 24px; }
            .content { padding: 32px 24px; }
        }

        .form-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 14px;
            line-height: 20px;
            font-weight: 600;
            color: var(--gray-700);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--gray-400);
            pointer-events: none;
            transition: color 180ms ease;
        }

        .input-field {
            width: 100%;
            height: 52px;
            background: #FFFFFF;
            border: 1px solid var(--gray-300);
            border-radius: 14px;
            padding: 14px 18px 14px 42px;
            font-size: 15px;
            color: var(--gray-900);
            font-family: inherit;
            transition: all 180ms ease;
        }

        input[name="ug_number"] {
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-field::placeholder { color: var(--gray-400); }
        .input-field:hover { border-color: var(--gray-400); }
        
        .input-field:focus {
            outline: none;
            border-color: var(--indigo-600);
            box-shadow: 0 0 0 4px var(--indigo-ring);
        }

        .input-field:focus + svg { color: var(--indigo-600); }

        .input-field[aria-invalid="true"] {
            border-color: var(--red-500);
            background: var(--red-50);
        }
        .input-field[aria-invalid="true"] + svg { color: var(--red-500); }
        .input-field[aria-invalid="true"]:focus {
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15);
        }

        .submit-container {
            margin-top: 8px;
        }

        .btn-submit {
            width: 100%;
            height: 52px;
            background: var(--indigo-600);
            color: #FFFFFF;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 10px 24px var(--indigo-glow);
            transition: all 180ms ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .btn-submit:hover:not(:disabled) {
            background: var(--indigo-700);
            transform: scale(1.02);
        }

        .btn-submit:active:not(:disabled) {
            transform: scale(0.98);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-submit:focus-visible {
            outline: none;
            box-shadow: 0 0 0 4px var(--indigo-ring), 0 10px 24px var(--indigo-glow);
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #FFF;
            animation: spin 1s linear infinite;
            position: absolute;
        }

        .btn-submit[aria-busy="true"] .spinner { display: block; }
        .btn-submit[aria-busy="true"] .btn-text { opacity: 0; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .alert-error {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--red-50);
            border: 1px solid #FECACA;
            color: var(--red-500);
            font-size: 14px;
            font-weight: 500;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            animation: shake 300ms ease-out;
        }

        .alert-success {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--green-50);
            border: 1px solid var(--green-200);
            color: var(--green-700);
            font-size: 14px;
            font-weight: 500;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-6px); }
        }

        .divider {
            height: 1px;
            background: var(--gray-100);
            margin: 24px 0;
        }

        .footer {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .footer p {
            font-size: 14px;
            line-height: 20px;
            font-weight: 600;
            color: var(--gray-500);
        }

        .footer a {
            color: var(--indigo-600);
            text-decoration: none;
            transition: color 180ms ease;
        }

        .footer a:hover {
            text-decoration: underline;
            color: var(--indigo-700);
        }
        
        .footer a.admin-link {
            color: var(--gray-400);
            font-weight: 500;
            font-size: 13px;
        }
        .footer a.admin-link:hover {
            color: var(--gray-700);
        }

    </style>
</head>
<body>

    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="card" role="main">
        <div class="header">
            <div class="logo-container">
                <i data-lucide="graduation-cap"></i>
            </div>
            <h1>Admission Portal</h1>
            <p>Department of AIML &amp; AIRO</p>
        </div>

        <div class="content">

            <div aria-live="polite" id="alert-container">
                {% if messages %}
                    {% for message in messages %}
                    <div class="alert-success">
                        <i data-lucide="check-circle" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
                        {{ message }}
                    </div>
                    {% endfor %}
                {% endif %}

                {% if error_message %}
                <div class="alert-error" id="error-alert">
                    <i data-lucide="alert-circle" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
                    {{ error_message }}
                </div>
                {% endif %}
            </div>

            <form method="POST" id="loginForm" class="form-layout">
                {% csrf_token %}

                <div class="input-group">
                    <label for="ug_number">UG Number</label>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="ug_number"
                            name="ug_number" 
                            required 
                            placeholder="e.g., 26UG03"
                            aria-label="UG Number"
                            autocomplete="username"
                            {% if error_message %}aria-invalid="true" aria-describedby="error-alert"{% endif %}
                            class="input-field"
                            autofocus
                        >
                        <i data-lucide="user"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password"
                            name="password" 
                            required 
                            placeholder="Enter your password"
                            aria-label="Password"
                            autocomplete="current-password"
                            {% if error_message %}aria-invalid="true" aria-describedby="error-alert"{% endif %}
                            class="input-field"
                        >
                        <i data-lucide="lock"></i>
                    </div>
                </div>

                <div class="submit-container">
                    <button type="submit" class="btn-submit" id="submitBtn">
                        <span class="btn-text">Secure Login</span>
                        <div class="spinner"></div>
                    </button>
                </div>
            </form>

            <div class="divider"></div>

            <div class="footer">
                <p>
                    New student? 
                    <a href="{% url 'student_register' %}">Register here</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', (e) => {
            if (submitBtn.getAttribute('aria-busy') === 'true') {
                e.preventDefault();
                return;
            }
            
            submitBtn.setAttribute('aria-busy', 'true');
            submitBtn.disabled = true;
        });
    </script>
</body>
</html>
